const UNITS = (() => {
  const u = {};
  for (let f = 1; f <= 13; f++) {

      const key = f + "-" + i;
      if (f <= 11)       u[key] = "sold";
      else if (f === 12) u[key] = i <= 4 ? "sold" : "available";
      else               u[key] = "available";
    }
  }
  // Andar 12, finais 06 e 07 (idx 5,6) = disponíveis (9 unidades disponíveis total)
  return u;
})();

const CONTENT = [

  {id:"s1v01",title:"Apresentação do Dunas — o que é, onde fica, por que importa",format:"Reel",date:"2026-04-07",status:"published",notes:"V1 Sessão 1 — abertura da série"},

  {id:"s1v04",title:"Studio inteligente: como 27m² viram um apê completo",format:"Reel",date:"2026-04-17",status:"published",notes:"Tipologia Studio — plantas e uso do espaço"},

  {id:"s1v09",title:"Dunas e o Porto: a 10 minutos do coração de Manaus",format:"Reel",date:"2026-05-05",status:"published",notes:"⚠ Confirmar distâncias reais antes de republicar"},
  {id:"s1v10",title:"Últimas unidades: o que ainda está disponível",format:"Reel",date:"2026-05-08",status:"published",notes:"V10 — fechamento Sessão 1 / CTA direto"},

// ─── SEED ─────────────────────────────────────────────
function log(msg, type="info") {
  const el = document.getElementById("log");
  const line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function progress(pct, label) {
  document.getElementById("prog-bar").style.width = pct + "%";
  document.getElementById("prog-label").textContent = label;
}

async function runSeed() {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("pass").value;
  const btn   = document.getElementById("run-btn");

  if (!email || !pass) { log("Preencha e-mail e senha.", "error"); return; }

  btn.disabled = true;
  btn.textContent = "Executando...";
  document.getElementById("prog-wrap").style.display = "block";

  try {
    // 1. Login
    log("🔐 Autenticando...");
    progress(5, "Autenticando...");
    await signInWithEmailAndPassword(auth, email, pass);
    log("✓ Autenticado com sucesso.", "ok");

    // 2. Units — usar writeBatch para velocidade
    log("🏢 Gravando unidades (91)...");
    progress(15, "Gravando unidades...");

    const unitEntries = Object.entries(UNITS);
    const BATCH_SIZE = 490; // Firestore max 500
    for (let i = 0; i < unitEntries.length; i += BATCH_SIZE) {
      const batch = writeBatch(db);
      unitEntries.slice(i, i + BATCH_SIZE).forEach(([key, status]) => {
        batch.set(doc(db, "dunas", "dados", "units", key), { status });
      });
      await batch.commit();
    }
    log(`✓ ${unitEntries.length} unidades gravadas (82 vendidas, 9 disponíveis).`, "ok");
    progress(50, "Unidades gravadas...");

    // 3. Phases
    log("🏗 Gravando cronograma (6 fases)...");
    const pBatch = writeBatch(db);
    PHASES.forEach(p => {
      pBatch.set(doc(db, "dunas", "dados", "phases", p.id), p);
    });
    await pBatch.commit();
    log("✓ 6 fases do cronograma gravadas.", "ok");
    progress(75, "Cronograma gravado...");

    // 4. Content
    log("📅 Gravando planejamento de conteúdo (17 itens)...");
    const cBatch = writeBatch(db);
    CONTENT.forEach(c => {
      cBatch.set(doc(db, "dunas", "dados", "content", c.id), c);
    });
    await cBatch.commit();
    log("✓ 17 itens de conteúdo gravados.", "ok");
    progress(100, "Concluído!");

    // Done
    log("", "");
    log("════════════════════════════════════", "ok");
    log("✅  Firebase populado com sucesso!", "ok");
    log("    Abra o painel principal agora.", "ok");
    log("════════════════════════════════════", "ok");
    btn.textContent = "✓ Concluído";
    btn.style.background = "#4a7c4e";

  } catch(e) {
    log("✗ Erro: " + e.message, "error");
    btn.disabled = false;
    btn.textContent = "Tentar novamente";
    progress(0, "Erro");
  }
}

window.runSeed = runSeed;
document.addEventListener("DOMContentLoaded", () => {
  const p = document.getElementById("pass");
  if (p) p.addEventListener("keydown", e => { if(e.key==="Enter") runSeed(); });
});
</script>
